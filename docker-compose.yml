version: "3.9"

services:
  chatbot:
    build: .
    container_name: langgraph_chatbot
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data           # tes PDFs persistent
      - ./vectorstore:/app/vectorstore  # index FAISS persist
    restart: unless-stopped